name: Daily RFM Recalculation

# Runs daily at 2 AM Jakarta time (19:00 UTC previous day)
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch: {} # allow manual trigger

jobs:
  recalculate-rfm:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RFM job endpoint
        run: |
          curl -X POST "${{ secrets.RAILWAY_APP_URL }}/api/jobs/recalculate-rfm" \
            -H "x-job-key: ${{ secrets.JOB_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error
