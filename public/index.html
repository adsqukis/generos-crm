<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Generos CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0d1117; margin: 0; }
    .display { font-family: 'Fraunces', serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #161b22; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    /* === SIDEBAR === */
    .sidebar { position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
      background: #161b22; border-right: 1px solid #30363d;
      display: flex; flex-direction: column; z-index: 100; }
    .sidebar-brand { padding: 16px 18px 12px; border-bottom: 1px solid #30363d; }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-item { display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 18px; background: none; border: none;
      color: #8b949e; font-size: 13px; cursor: pointer; text-align: left;
      transition: all 0.15s; }
    .nav-item:hover { color: #e6edf3; background: rgba(48,54,61,0.4); }
    .nav-item.active { color: #58a6ff; background: rgba(88,166,255,0.08);
      border-right: 2px solid #58a6ff; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 12px 18px; border-top: 1px solid #30363d; }

    /* === MAIN CONTENT === */
    .main-content { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; flex: 1; }
    .topbar { height: 48px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid #30363d; background: #161b22; }
    .content-area { flex: 1; padding: 16px; overflow-y: auto; }

    /* === MOBILE OVERRIDES === */
    .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 99; }
    .hamburger { display: none; background: none; border: none; color: #8b949e;
      cursor: pointer; padding: 4px; }
    .hamburger svg { width: 22px; height: 22px; }

    .bottom-nav { display: none; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .hamburger { display: flex; }
      .mobile-overlay.active { display: block; }

      /* Mobile bottom nav */
      .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        background: #161b22; border-top: 1px solid #30363d; z-index: 50;
        overflow-x: auto; }
      .bottom-nav button { flex: 1; min-width: 60px; padding: 6px 4px;
        background: none; border: none; color: #8b949e; font-size: 10px;
        cursor: pointer; text-align: center; transition: color 0.15s; }
      .bottom-nav button.active { color: #58a6ff; }
      .bottom-nav button svg { width: 18px; height: 18px; display: block;
        margin: 0 auto 2px; }
      .content-area { padding-bottom: 64px; }

      /* Responsive table */
      .table-wrap { overflow-x: auto; }
      table { font-size: 12px; }
      th, td { padding: 6px 8px !important; }
      .hide-mobile { display: none !important; }
    }

    /* Responsive inputs */
    input, button { font-family: inherit; }
    .btn-xs { padding: 2px 8px; font-size: 11px; border-radius: 4px; border: none;
      cursor: pointer; }
    @media (max-width: 480px) {
      .content-area { padding: 10px; }
      .grid-cols-2 { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API = window.location.origin;

    // --- Color tokens ---
    const C = {
      bg: '#0d1117', panel: '#161b22', border: '#30363d',
      text: '#e6edf3', dim: '#8b949e', accent: '#3fb950',
      accent2: '#58a6ff', warn: '#d29922', danger: '#f85149',
    };

    // --- SVG Icons ---
    const Icons = {
      overview: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm11 0h7v7h-7V3zM3 14h7v7H3v-7zm11 0h7v7h-7v-7z"/></svg>,
      customers: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm-7 9a7 7 0 0114 0"/></svg>,
      cohorts: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
      segments: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="2"/><circle cx="16" cy="12" r="2"/><circle cx="10" cy="18" r="2"/></svg>,
      upload: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m14-7l-7-7-7 7m7-7v12"/></svg>,
      chat: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>,
      hamburger: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>,
      close: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>,
      edit: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
      trash: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>,
      check: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path d="M5 13l4 4L19 7"/></svg>,
      x: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="14" height="14"><path d="M18 6L6 18M6 6l12 12"/></svg>,
      search: <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>,
    };

    function api(path, opts = {}) {
      const token = localStorage.getItem('token');
      return fetch(API + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: 'Bearer ' + token } : {}),
          ...opts.headers,
        },
      }).then(async (r) => {
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || 'Request failed');
        return data;
      });
    }

    // ============ LOGIN ============
    function Login({ onLogin }) {
      const [email, setEmail] = useState('admin@generos.com');
      const [password, setPassword] = useState('');
      const [err, setErr] = useState('');
      const [loading, setLoading] = useState(false);
      const submit = async () => {
        setErr(''); setLoading(true);
        try {
          const data = await api('/api/auth/login', {
            method: 'POST', body: JSON.stringify({ email, password }),
          });
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          onLogin(data.user);
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };
      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{ background: C.bg }}>
          <div className="w-full max-w-sm">
            <div className="mb-8 text-center">
              <h1 className="display text-4xl font-bold" style={{ color: C.text }}>Generos</h1>
              <p className="mono text-xs mt-1" style={{ color: C.dim }}>CRM · SEGMENTATION · STRATEGY</p>
            </div>
            <div className="rounded-lg p-6" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
              <label className="block text-xs mb-1" style={{ color: C.dim }}>Email</label>
              <input value={email} onChange={(e) => setEmail(e.target.value)} disabled={loading}
                className="w-full mb-4 px-3 py-2 rounded text-sm outline-none"
                style={{ background: C.bg, border: `1px solid ${C.border}`, color: C.text }} />
              <label className="block text-xs mb-1" style={{ color: C.dim }}>Password</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && submit()} disabled={loading}
                className="w-full mb-4 px-3 py-2 rounded text-sm outline-none"
                style={{ background: C.bg, border: `1px solid ${C.border}`, color: C.text }} />
              {err && <p className="text-xs mb-3" style={{ color: C.danger }}>{err}</p>}
              <button onClick={submit} disabled={loading}
                className="w-full py-2 rounded text-sm font-medium transition"
                style={{ background: C.accent, color: '#0d1117' }}>
                {loading ? 'Signing in…' : 'Sign in'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============ STAT CARD ============
    function Stat({ label, value, accent }) {
      return (
        <div className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
          <p className="text-xs mb-1" style={{ color: C.dim }}>{label}</p>
          <p className="display text-2xl font-bold" style={{ color: accent || C.text }}>{value}</p>
        </div>
      );
    }

    // ============ OVERVIEW ============
    function Overview() {
      const [data, setData] = useState(null);
      const [err, setErr] = useState('');
      useEffect(() => {
        api('/api/dashboard/overview').then(setData).catch((e) => setErr(e.message));
      }, []);
      if (err) return <Empty msg={err} />;
      if (!data) return <Loading />;
      return (
        <div className="space-y-4">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <Stat label="Total Customers" value={data.totalCustomers.toLocaleString()} accent={C.accent2} />
            <Stat label="Active Cohorts" value={data.activeCohorts} accent={C.accent} />
            <Stat label="Repeat Rate" value={data.repeatRate + '%'} accent={C.warn} />
            <Stat label="Pending Follow-ups" value={data.pendingTasks} accent={C.danger} />
          </div>
          {data.lastUpload && (
            <div className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
              <p className="text-xs mb-1" style={{ color: C.dim }}>Last Upload</p>
              <p className="text-sm" style={{ color: C.text }}>
                {data.lastUpload.file_name} · {data.lastUpload.success_count} rows ·{' '}
                {new Date(data.lastUpload.created_at).toLocaleString()}
              </p>
            </div>
          )}
        </div>
      );
    }

    // ============ CUSTOMERS (with Edit/Delete) ============
    function Customers() {
      const [rows, setRows] = useState(null);
      const [search, setSearch] = useState('');
      const [err, setErr] = useState('');
      const [editing, setEditing] = useState(null); // phone being edited
      const [editName, setEditName] = useState('');
      const [editPhone, setEditPhone] = useState('');
      const [busy, setBusy] = useState(false);

      const load = () => {
        api('/api/customers?search=' + encodeURIComponent(search) + '&limit=100')
          .then((d) => setRows(d.customers)).catch((e) => setErr(e.message));
      };
      useEffect(() => { load(); }, []);

      const startEdit = (c) => {
        setEditing(c.phone_number);
        setEditName(c.name || '');
        setEditPhone(c.phone_number);
      };
      const cancelEdit = () => {
        setEditing(null); setEditName(''); setEditPhone('');
      };
      const saveEdit = async (phone) => {
        setBusy(true);
        try {
          const body = {};
          if (editName.trim()) body.name = editName.trim();
          if (editPhone.trim()) body.phone_number = editPhone.trim();
          await api('/api/customers/' + encodeURIComponent(phone), {
            method: 'PUT', body: JSON.stringify(body),
          });
          cancelEdit();
          load();
        } catch (e) { alert('Error: ' + e.message); }
        setBusy(false);
      };
      const deleteCustomer = async (phone, name) => {
        if (!confirm(`Delete customer "${name || phone}"? This will also delete their purchases and tasks.`)) return;
        setBusy(true);
        try {
          await api('/api/customers/' + encodeURIComponent(phone), { method: 'DELETE' });
          load();
        } catch (e) { alert('Error: ' + e.message); }
        setBusy(false);
      };

      if (err) return <Empty msg={err} />;
      if (!rows) return <Loading />;

      return (
        <div className="space-y-3">
          <div className="flex gap-2">
            <div className="flex-1 relative">
              <input value={search} onChange={(e) => setSearch(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && load()}
                placeholder="Search phone or name…"
                className="w-full px-3 py-2 pl-8 rounded text-sm outline-none"
                style={{ background: C.panel, border: `1px solid ${C.border}`, color: C.text }} />
              <span className="absolute left-2 top-1/2 -translate-y-1/2" style={{ color: C.dim }}>{Icons.search}</span>
            </div>
            <button onClick={load} className="px-4 rounded text-sm" style={{ background: C.accent2, color: '#0d1117' }}>Search</button>
          </div>
          <div className="table-wrap rounded-lg overflow-hidden" style={{ border: `1px solid ${C.border}` }}>
            <table className="w-full text-sm">
              <thead>
                <tr style={{ background: C.panel }}>
                  <th className="text-left px-3 py-2 text-xs" style={{ color: C.dim }}>Phone</th>
                  <th className="text-left px-3 py-2 text-xs" style={{ color: C.dim }}>Name</th>
                  <th className="text-left px-3 py-2 text-xs hide-mobile" style={{ color: C.dim }}>RFM</th>
                  <th className="text-left px-3 py-2 text-xs hide-mobile" style={{ color: C.dim }}>Freq</th>
                  <th className="text-right px-3 py-2 text-xs" style={{ color: C.dim }}>Spend</th>
                  <th className="text-center px-3 py-2 text-xs" style={{ color: C.dim, width: 80 }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {rows.length === 0 && (
                  <tr><td colSpan="6" className="px-3 py-6 text-center text-sm" style={{ color: C.dim, background: C.bg }}>
                    No customers yet. Upload a CSV to get started.
                  </td></tr>
                )}
                {rows.map((c) => (
                  <tr key={c.phone_number} style={{ background: C.bg, borderTop: `1px solid ${C.border}` }}>
                    {editing === c.phone_number ? (
                      <>
                        <td className="px-3 py-2">
                          <input value={editPhone} onChange={(e) => setEditPhone(e.target.value)}
                            className="w-full px-2 py-1 rounded text-xs mono outline-none"
                            style={{ background: C.panel, border: `1px solid ${C.border}`, color: C.text }} />
                        </td>
                        <td className="px-3 py-2">
                          <input value={editName} onChange={(e) => setEditName(e.target.value)}
                            className="w-full px-2 py-1 rounded text-xs outline-none"
                            style={{ background: C.panel, border: `1px solid ${C.border}`, color: C.text }} />
                        </td>
                        <td className="px-3 py-2 hide-mobile" style={{ color: C.accent }}>{c.rfm_score || '—'}</td>
                        <td className="px-3 py-2 hide-mobile" style={{ color: C.text }}>{c.rfm_frequency}</td>
                        <td className="px-3 py-2 text-right mono text-xs" style={{ color: C.text }}>
                          {Number(c.rfm_monetary || 0).toLocaleString()}
                        </td>
                        <td className="px-3 py-2 text-center">
                          <div className="flex gap-1 justify-center">
                            <button onClick={() => saveEdit(c.phone_number)} disabled={busy}
                              className="btn-xs" style={{ background: C.accent, color: '#0d1117' }}>{Icons.check}</button>
                            <button onClick={cancelEdit} disabled={busy}
                              className="btn-xs" style={{ background: C.panel, color: C.dim, border: `1px solid ${C.border}` }}>{Icons.x}</button>
                          </div>
                        </td>
                      </>
                    ) : (
                      <>
                        <td className="px-3 py-2 mono text-xs" style={{ color: C.text }}>{c.phone_number}</td>
                        <td className="px-3 py-2" style={{ color: C.text }}>{c.name}</td>
                        <td className="px-3 py-2 mono text-xs hide-mobile" style={{ color: C.accent }}>{c.rfm_score || '—'}</td>
                        <td className="px-3 py-2 hide-mobile" style={{ color: C.text }}>{c.rfm_frequency}</td>
                        <td className="px-3 py-2 text-right mono text-xs" style={{ color: C.text }}>
                          {Number(c.rfm_monetary || 0).toLocaleString()}
                        </td>
                        <td className="px-3 py-2 text-center">
                          <div className="flex gap-1 justify-center">
                            <button onClick={() => startEdit(c)}
                              className="btn-xs" style={{ background: C.accent2, color: '#0d1117' }} title="Edit">{Icons.edit}</button>
                            <button onClick={() => deleteCustomer(c.phone_number, c.name)}
                              className="btn-xs" style={{ background: C.danger, color: '#fff' }} title="Delete">{Icons.trash}</button>
                          </div>
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ============ COHORTS ============
    function Cohorts() {
      const [rows, setRows] = useState(null);
      const [err, setErr] = useState('');
      useEffect(() => {
        api('/api/cohorts').then((d) => setRows(d.cohorts)).catch((e) => setErr(e.message));
      }, []);
      if (err) return <Empty msg={err} />;
      if (!rows) return <Loading />;
      if (rows.length === 0) return <Empty msg="No cohorts yet. Upload customers to generate cohorts." />;
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {rows.map((c) => (
            <div key={c.id} className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
              <h3 className="display text-lg font-semibold mb-3" style={{ color: C.text }}>{c.cohort_name}</h3>
              <div className="grid grid-cols-2 gap-2 text-sm">
                <Metric label="Customers" value={c.total_customers} />
                <Metric label="Repeat Rate" value={c.repeat_purchase_rate + '%'} color={C.accent} />
                <Metric label="Avg LTV" value={Number(c.avg_ltv).toLocaleString()} />
                <Metric label="Churn" value={c.churn_rate + '%'} color={C.danger} />
                <Metric label="30d Retention" value={c.days_30_retention + '%'} />
                <Metric label="90d Retention" value={c.days_90_retention + '%'} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    function Metric({ label, value, color }) {
      return (
        <div className="flex justify-between">
          <span style={{ color: C.dim }}>{label}</span>
          <span className="mono" style={{ color: color || C.text }}>{value}</span>
        </div>
      );
    }

    // ============ SEGMENTS ============
    function Segments() {
      const [rows, setRows] = useState(null);
      const [err, setErr] = useState('');
      useEffect(() => {
        api('/api/segments').then((d) => setRows(d.segments)).catch((e) => setErr(e.message));
      }, []);
      if (err) return <Empty msg={err} />;
      if (!rows) return <Loading />;
      return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
          {rows.map((s) => (
            <div key={s.id} className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}`, borderTop: `2px solid ${C.accent2}` }}>
              <div className="flex justify-between items-start mb-2">
                <h3 className="font-semibold" style={{ color: C.text }}>{s.segment_name}</h3>
                <span className="mono text-xs px-2 py-0.5 rounded" style={{ background: C.bg, color: C.dim }}>P{s.priority}</span>
              </div>
              <p className="text-xs mb-3" style={{ color: C.dim }}>{s.description}</p>
              <div className="flex justify-between text-sm">
                <span style={{ color: C.dim }}>Customers</span>
                <span className="mono" style={{ color: C.accent }}>{s.customer_count}</span>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ============ UPLOAD ============
    function Upload() {
      const [result, setResult] = useState(null);
      const [err, setErr] = useState('');
      const [busy, setBusy] = useState(false);
      const fileRef = useRef();

      const doUpload = async (file) => {
        setErr(''); setResult(null); setBusy(true);
        try {
          const fd = new FormData();
          fd.append('file', file);
          const token = localStorage.getItem('token');
          const r = await fetch(API + '/api/uploads', {
            method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd,
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || 'Upload failed');
          setResult(data);
        } catch (e) { setErr(e.message); }
        setBusy(false);
      };

      return (
        <div className="space-y-4 max-w-xl">
          <div className="rounded-lg p-8 text-center" style={{ background: C.panel, border: `2px dashed ${C.border}` }}>
            <p className="text-sm mb-4" style={{ color: C.text }}>Upload customer CSV or Excel</p>
            <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" className="hidden"
              onChange={(e) => e.target.files[0] && doUpload(e.target.files[0])} />
            <button onClick={() => fileRef.current.click()} disabled={busy}
              className="px-5 py-2 rounded text-sm font-medium" style={{ background: C.accent, color: '#0d1117' }}>
              {busy ? 'Processing…' : 'Choose file'}
            </button>
            <p className="text-xs mt-4 mono" style={{ color: C.dim }}>
              Required: phone_number, name, purchase_date, purchase_amount
            </p>
          </div>
          {err && <div className="rounded-lg p-3 text-sm" style={{ background: C.panel, color: C.danger, border: `1px solid ${C.danger}` }}>{err}</div>}
          {result && (
            <div className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.accent}` }}>
              <p className="text-sm mb-2" style={{ color: C.accent }}>Upload complete</p>
              <div className="text-sm space-y-1" style={{ color: C.text }}>
                <p>New customers: {result.newCustomers}</p>
                <p>Updated: {result.updatedCustomers}</p>
                <p>Errors: {result.errors?.length || 0}</p>
              </div>
              {result.errors?.length > 0 && (
                <div className="mt-2 text-xs mono" style={{ color: C.warn }}>
                  {result.errors.slice(0, 5).map((e, i) => <p key={i}>Row {e.row}: {e.error}</p>)}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ============ CHAT ============
    function Chat() {
      const [messages, setMessages] = useState(() => {
        try {
          const saved = localStorage.getItem('chat_messages');
          return saved ? JSON.parse(saved) : [{ role: 'ai', text: 'Ask me about your cohorts, segments, or customer patterns.' }];
        } catch { return [{ role: 'ai', text: 'Ask me about your cohorts, segments, or customer patterns.' }]; }
      });
      const [input, setInput] = useState('');
      const [busy, setBusy] = useState(false);
      const [convId, setConvId] = useState(() => localStorage.getItem('chat_convId') || null);
      const endRef = useRef();

      useEffect(() => { localStorage.setItem('chat_messages', JSON.stringify(messages)); }, [messages]);
      useEffect(() => { if (convId) localStorage.setItem('chat_convId', convId); }, [convId]);
      useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

      const send = async () => {
        if (!input.trim() || busy) return;
        const userMsg = input.trim();
        setInput('');
        setMessages((m) => [...m, { role: 'user', text: userMsg }]);
        setBusy(true);
        try {
          const data = await api('/api/chat/message', {
            method: 'POST', body: JSON.stringify({ message: userMsg, conversationId: convId }),
          });
          setConvId(data.conversationId);
          const cleaned = data.reply.replace(/\*+/g, '');
          setMessages((m) => [...m, { role: 'ai', text: cleaned }]);
        } catch (e) {
          setMessages((m) => [...m, { role: 'ai', text: 'Error: ' + e.message, error: true }]);
        }
        setBusy(false);
      };

      return (
        <div className="max-w-2xl mx-auto flex flex-col" style={{ height: 'calc(100vh - 140px)' }}>
          <div className="flex-1 overflow-y-auto space-y-3 mb-3">
            {messages.map((m, i) => (
              <div key={i} className={'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start')}>
                <div className="max-w-md rounded-lg px-4 py-2 text-sm whitespace-pre-wrap"
                  style={{
                    background: m.role === 'user' ? C.accent2 : C.panel,
                    color: m.role === 'user' ? '#0d1117' : (m.error ? C.danger : C.text),
                    border: m.role === 'ai' ? `1px solid ${C.border}` : 'none',
                  }}>
                  {m.text}
                </div>
              </div>
            ))}
            {busy && <div className="text-xs mono" style={{ color: C.dim }}>thinking…</div>}
            <div ref={endRef} />
          </div>
          <div className="flex gap-2 mb-3">
            <input value={input} onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && send()}
              placeholder="Ask about your data…"
              className="flex-1 px-3 py-2 rounded text-sm outline-none"
              style={{ background: C.panel, border: `1px solid ${C.border}`, color: C.text }} />
            <button onClick={send} disabled={busy} className="px-4 rounded text-sm font-medium" style={{ background: C.accent, color: '#0d1117' }}>Send</button>
          </div>
          {/* Panduan */}
          <div className="rounded-lg p-3" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
            <p className="text-xs font-semibold mb-2" style={{ color: C.accent2 }}>📖 Panduan Chat AI</p>
            <div className="space-y-1">
              <p className="text-xs" style={{ color: C.dim }}>Coba tanya:</p>
              <div className="flex flex-wrap gap-1.5">
                {[ 
                  'Tampilkan customer dengan repeat purchase tertinggi',
                  'Segment mana yang paling menguntungkan?',
                  'Buatkan rekomendasi untuk cohort yang churn tinggi',
                  'Analisa pola pembelian 30 hari terakhir',
                  'Customer mana yang perlu difollow-up?',
                ].map((q, i) => (
                  <button key={i} onClick={() => { setInput(q); }}
                    className="text-xs px-2 py-1 rounded transition"
                    style={{ background: C.bg, color: C.text, border: `1px solid ${C.border}` }}>
                    {q}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============ HELPERS ============
    function Loading() { return <div className="text-sm mono py-8 text-center" style={{ color: C.dim }}>loading…</div>; }
    function Empty({ msg }) { return <div className="rounded-lg p-6 text-sm text-center" style={{ background: C.panel, color: C.dim, border: `1px solid ${C.border}` }}>{msg}</div>; }

    // ============ APP SHELL with SIDEBAR ============
    function App() {
      const [user, setUser] = useState(() => {
        const u = localStorage.getItem('user');
        return u ? JSON.parse(u) : null;
      });
      const [tab, setTab] = useState('overview');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      if (!user) return <Login onLogin={setUser} />;

      const tabs = [
        { id: 'overview', label: 'Overview', icon: Icons.overview },
        { id: 'customers', label: 'Customers', icon: Icons.customers },
        { id: 'cohorts', label: 'Cohorts', icon: Icons.cohorts },
        { id: 'segments', label: 'Segments', icon: Icons.segments },
        { id: 'upload', label: 'Upload', icon: Icons.upload },
        { id: 'chat', label: 'Chat AI', icon: Icons.chat },
      ];

      const isActive = (id) => tab === id;

      const switchTab = (id) => {
        setTab(id);
        setSidebarOpen(false);
      };

      const logout = () => {
        localStorage.removeItem('token'); localStorage.removeItem('user'); localStorage.removeItem('chat_messages'); localStorage.removeItem('chat_convId'); setUser(null);
      };

      const navItems = tabs.map((t) => (
        <button key={t.id} onClick={() => switchTab(t.id)}
          className={'nav-item' + (isActive(t.id) ? ' active' : '')}>
          {t.icon}
          {t.label}
        </button>
      ));

      return (
        <div className="min-h-screen flex" style={{ background: C.bg, color: C.text }}>
          {/* Overlay for mobile */}
          <div className={'mobile-overlay' + (sidebarOpen ? ' active' : '')}
            onClick={() => setSidebarOpen(false)} />

          {/* Sidebar */}
          <aside className={'sidebar' + (sidebarOpen ? ' open' : '')}>
            <div className="sidebar-brand">
              <div className="flex items-center gap-2">
                <span className="display text-lg font-bold">Generos</span>
                <span className="mono text-xs px-2 py-0.5 rounded" style={{ background: '#0d1117', color: C.dim }}>
                  {user.role}
                </span>
              </div>
              <p className="text-xs mt-1" style={{ color: C.dim }}>CRM · SEGMENTATION · STRATEGY</p>
            </div>
            <nav className="sidebar-nav">{navItems}</nav>
            <div className="sidebar-footer">
              <button onClick={logout} className="nav-item" style={{ color: C.danger }}>
                <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" width="16" height="16">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5-5-5m5 5H9"/>
                </svg>
                Sign out
              </button>
            </div>
          </aside>

          {/* Main */}
          <div className="main-content">
            {/* Top bar with hamburger */}
            <div className="topbar">
              <div className="flex items-center gap-3">
                <button className="hamburger" onClick={() => setSidebarOpen(!sidebarOpen)}>
                  {sidebarOpen ? Icons.close : Icons.hamburger}
                </button>
                <span className="display text-base font-bold">{tabs.find((t) => isActive(t.id))?.label || 'Overview'}</span>
              </div>
            </div>

            {/* Content */}
            <div className="content-area">
              {tab === 'overview' && <Overview />}
              {tab === 'customers' && <Customers />}
              {tab === 'cohorts' && <Cohorts />}
              {tab === 'segments' && <Segments />}
              {tab === 'upload' && <Upload />}
              {tab === 'chat' && <Chat />}
            </div>
          </div>

          {/* Bottom nav (mobile) */}
          <nav className="bottom-nav">
            {tabs.map((t) => (
              <button key={t.id} onClick={() => switchTab(t.id)}
                className={isActive(t.id) ? 'active' : ''}>
                {t.icon}
                {t.label}
              </button>
            ))}
          </nav>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
